<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>CIMBAR 浏览器端无网文件传输工具</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #fbfbfe 0%, #f3f0fa 50%, #e8e2f7 100%);
      --text-main: #232154;
      --text-muted: #6e6b8f;
      --accent-cyan: #4f46e5;
      --accent-purple: #7c3aed;
      --accent-purple-glow: rgba(124, 58, 237, 0.15);
      --accent-cyan-glow: rgba(79, 70, 229, 0.15);
      --glass-bg: rgba(255, 255, 255, 0.75);
      --glass-border: rgba(124, 58, 237, 0.12);
      --glass-hover-border: rgba(124, 58, 237, 0.3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Ambient background glows */
    .glow-sphere {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
      opacity: 0.35;
      pointer-events: none;
    }
    .glow-cyan {
      top: 10%;
      left: 15%;
      background: var(--accent-cyan);
    }
    .glow-purple {
      bottom: 10%;
      right: 15%;
      background: var(--accent-purple);
    }

    header {
      text-align: center;
      margin-bottom: 3.5rem;
      animation: fadeInDown 0.8s ease-out;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #4f46e5 0%, #7c3aed 50%, #9333ea 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 40px rgba(124, 58, 237, 0.1);
    }

    header p {
      font-size: 1.1rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    .main-container {
      max-width: 1000px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5rem;
      margin-bottom: 3.5rem;
      animation: fadeInUp 0.8s ease-out;
    }

    @media (max-width: 768px) {
      body {
        justify-content: flex-start !important;
        padding: max(1.5rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-left)) max(2.5rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-right));
      }
      header {
        margin-bottom: 1.5rem;
      }
      .main-container {
        grid-template-columns: 1fr;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .card {
        padding: 1.5rem 1.2rem;
        border-radius: 18px;
      }
      .icon-wrapper {
        margin-bottom: 0.8rem;
        width: 58px;
        height: 58px;
      }
      .card h2 {
        font-size: 1.35rem;
        margin-bottom: 0.4rem;
      }
      .card p {
        margin-bottom: 1.2rem;
        font-size: 0.85rem;
        max-width: 320px;
      }
      .btn {
        padding: 0.75rem 1.5rem;
        font-size: 0.95rem;
      }
      h1 {
        font-size: 2.2rem;
      }
    }

    @media (max-width: 480px) {
      header {
        margin-bottom: 1rem;
      }
      .card p {
        display: none;
      }
      .card {
        padding: 1.2rem 1rem;
      }
      .icon-wrapper {
        margin-bottom: 0.6rem;
        width: 50px;
        height: 50px;
      }
      .card h2 {
        font-size: 1.2rem;
        margin-bottom: 0.5rem;
      }
      .main-container {
        gap: 0.8rem;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 1.8rem;
      }
      header p {
        font-size: 0.9rem;
      }
    }

    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(124, 58, 237, 0.05);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, transparent 100%);
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: var(--glass-hover-border);
      box-shadow: 0 20px 40px rgba(124, 58, 237, 0.08);
    }

    .card-send:hover {
      box-shadow: 0 20px 40px rgba(79, 70, 229, 0.12), 0 0 1px 1px var(--accent-cyan-glow);
    }

    .card-recv:hover {
      box-shadow: 0 20px 40px rgba(124, 58, 237, 0.12), 0 0 1px 1px var(--accent-purple-glow);
    }

    .icon-wrapper {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
      position: relative;
    }

    .card-send .icon-wrapper {
      background: rgba(79, 70, 229, 0.08);
      border: 1px solid rgba(79, 70, 229, 0.15);
      color: var(--accent-cyan);
    }

    .card-recv .icon-wrapper {
      background: rgba(124, 58, 237, 0.08);
      border: 1px solid rgba(124, 58, 237, 0.15);
      color: var(--accent-purple);
    }

    .card h2 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    .card p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2.5rem;
      max-width: 280px;
    }

    .btn {
      max-width: 240px;
      width: 100%;
      padding: 1rem 2rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-block;
      margin: 0 auto;
    }

    .btn-cyan {
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
      color: #ffffff;
      border: none;
      box-shadow: 0 4px 14px rgba(79, 70, 229, 0.25);
    }

    .btn-cyan:hover {
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.45);
      transform: scale(1.02);
    }

    .btn-purple {
      background: linear-gradient(135deg, #7c3aed 0%, #9061f9 100%);
      color: #ffffff;
      border: none;
      box-shadow: 0 4px 14px rgba(124, 58, 237, 0.25);
    }

    .btn-purple:hover {
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.45);
      transform: scale(1.02);
    }

    /* Connection Panel (QR helper) */
    .connection-panel {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      max-width: 600px;
      width: 100%;
      padding: 2.5rem;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      gap: 2rem;
      box-shadow: 0 10px 30px rgba(124, 58, 237, 0.05);
      animation: fadeInUp 0.9s ease-out;
    }

    @media (max-width: 600px) {
      .connection-panel {
        flex-direction: column;
        text-align: center;
        padding: 2rem 1.5rem;
      }
    }

    .qr-container {
      background: white;
      padding: 0.8rem;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.08);
      flex-shrink: 0;
    }

    .qr-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .qr-info h3 {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .qr-info p {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 1rem;
    }

    .server-url {
      font-family: monospace;
      background: rgba(124, 58, 237, 0.05);
      border: 1px dashed rgba(124, 58, 237, 0.2);
      padding: 0.5rem 0.8rem;
      border-radius: 8px;
      color: var(--accent-purple);
      font-size: 0.9rem;
      word-break: break-all;
    }

    /* Keyframes */
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="glow-sphere glow-cyan"></div>
  <div class="glow-sphere glow-purple"></div>

  <header>
    <h1>Cimbar 传输中心</h1>
    <p>在浏览器中使用彩色条形码进行完全离线、跨设备的文件传输（无需任何网络连接）</p>
  </header>

  <main class="main-container">
    
    <!-- Send Card -->
    <div class="card card-send">
      <div class="icon-wrapper">
        <!-- SVG Send Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
        </svg>
      </div>
      <h2>文件发送端</h2>
      <p>选择一个本地文件，将其编码为在屏幕上播放的动态彩色条形码流（完全离线）。</p>
      <a href="send.html" class="btn btn-cyan">开始发送</a>
    </div>

    <!-- Receive Card -->
    <div class="card card-recv">
      <div class="icon-wrapper">
        <!-- SVG Camera/Recv Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </div>
      <h2>文件接收端</h2>
      <p>使用设备摄像头扫描屏幕上的动态条形码，实时解码并瞬间下载重组后的文件（完全离线）。</p>
      <a href="recv.html" class="btn btn-purple">开始接收</a>
    </div>

  </main>

</body>
</html>
